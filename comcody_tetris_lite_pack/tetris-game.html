<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ComCody Tetris Lite</title>
<style>
:root{--bg:#06101d;--panel:#101b2d;--ink:#f8fafc;--muted:#a9b9d6;--gold:#ffd166;--green:#38e078;--blue:#57a6ff;--red:#ff5a65;--cell:min(4.4dvh,7.8vw)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#1a335c,#06101d 65%)}
.app{width:min(940px,96vw);height:min(920px,96dvh);display:grid;grid-template-columns:minmax(260px,1fr) minmax(130px,180px);gap:14px;padding:14px}.panel{background:#101b2dcc;border:1px solid #2b4364;border-radius:22px;padding:14px;box-shadow:0 24px 70px #0008;min-height:0}.boardWrap{display:grid;place-items:center;overflow:hidden}.board{display:grid;grid-template-columns:repeat(10,var(--cell));grid-template-rows:repeat(20,var(--cell));gap:3px;background:#050b14;border:3px solid var(--blue);border-radius:18px;padding:8px;box-shadow:0 0 0 3px #ffffff10 inset}.cell{width:var(--cell);height:var(--cell);border-radius:7px;background:#0f172a;box-shadow:inset 0 0 0 1px #ffffff12}.cell.filled{background:var(--c);box-shadow:inset 0 0 0 2px #ffffff66,0 0 12px color-mix(in srgb,var(--c) 65%,transparent)}.side{display:grid;grid-template-rows:auto auto 1fr auto;gap:12px}h1{font-size:clamp(24px,3vw,42px);margin:0}.stat{font-weight:950;font-size:22px;color:var(--gold)}.next{display:grid;grid-template-columns:repeat(4,28px);grid-template-rows:repeat(4,28px);gap:3px;place-content:center;background:#050b14;border:1px solid #2b4364;border-radius:18px;padding:10px}.next div{border-radius:6px;background:#0f172a}.next .on{background:var(--c);box-shadow:inset 0 0 0 2px #ffffff55}.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}button{border:0;border-radius:14px;background:#19365d;color:white;font-weight:950;padding:12px;box-shadow:inset 0 0 0 2px #3d6fa8;cursor:pointer}.primary{background:#134b2a;box-shadow:inset 0 0 0 2px var(--green)}.hint{color:var(--muted);font-size:13px;line-height:1.4}@media(max-width:740px){.app{grid-template-columns:1fr;grid-template-rows:1fr auto}.side{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;align-items:start}.controls{grid-column:1/3;grid-template-columns:repeat(4,1fr)}.hint{display:none}:root{--cell:min(3.2dvh,8vw)}}
</style>
</head>
<body>
<div class="app">
  <main class="panel boardWrap"><div id="board" class="board"></div></main>
  <aside class="panel side">
    <div><h1>🧩 Tetris Lite</h1><div class="hint">Imported as a ComCody module pack. Keyboard: arrows / space.</div></div>
    <div><div>Score</div><div id="score" class="stat">0</div><div>Lines</div><div id="lines" class="stat">0</div></div>
    <div><div style="font-weight:950;margin-bottom:8px">Next</div><div id="next" class="next"></div></div>
    <div class="controls"><button id="left">←</button><button id="right">→</button><button id="rotate">↻</button><button id="drop" class="primary">↓</button><button id="hard">⤓</button><button id="reset">Reset</button></div>
  </aside>
</div>
<script>
(()=>{
const W=10,H=20,COLORS={I:'#22d3ee',O:'#facc15',T:'#a78bfa',S:'#4ade80',Z:'#fb7185',J:'#60a5fa',L:'#fb923c'};
const SHAPES={I:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]]],O:[[[1,0],[2,0],[1,1],[2,1]]],T:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],S:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]]],Z:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]]],J:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],L:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]]};
const $=s=>document.querySelector(s);let grid,piece,next,score=0,lines=0,tick=0,last=0,over=false;
function empty(){return Array.from({length:H},()=>Array(W).fill(null))}function rand(){const t=Object.keys(SHAPES)[Math.random()*7|0];return{t,x:3,y:0,r:0,c:COLORS[t]}}function cells(p=piece,dx=0,dy=0,dr=0){const rots=SHAPES[p.t],r=(p.r+dr+rots.length)%rots.length;return rots[r].map(([x,y])=>[p.x+x+dx,p.y+y+dy])}function hit(dx=0,dy=0,dr=0){return cells(piece,dx,dy,dr).some(([x,y])=>x<0||x>=W||y>=H||(y>=0&&grid[y][x]))}function spawn(){piece=next||rand();next=rand();piece.x=3;piece.y=0;piece.r=0;if(hit())over=true;draw()}function merge(){cells().forEach(([x,y])=>{if(y>=0)grid[y][x]=piece.c});clear();spawn()}function clear(){let n=0;for(let y=H-1;y>=0;y--){if(grid[y].every(Boolean)){grid.splice(y,1);grid.unshift(Array(W).fill(null));n++;y++}}if(n){lines+=n;score+= [0,100,300,500,800][n]||1200;$('#score').textContent=score;$('#lines').textContent=lines}}function move(dx){if(over)return;if(!hit(dx,0,0))piece.x+=dx;draw()}function rotate(){if(over)return;if(!hit(0,0,1))piece.r=(piece.r+1)%SHAPES[piece.t].length;else for(const dx of[-1,1,-2,2])if(!hit(dx,0,1)){piece.x+=dx;piece.r=(piece.r+1)%SHAPES[piece.t].length;break}draw()}function soft(){if(over)return;if(!hit(0,1,0))piece.y++;else merge();draw()}function hard(){while(!hit(0,1,0))piece.y++;merge()}function draw(){const b=$('#board');b.innerHTML='';const active=new Map(cells().map(p=>[p.join(','),piece.c]));for(let y=0;y<H;y++)for(let x=0;x<W;x++){const d=document.createElement('div');const c=active.get(x+','+y)||grid[y][x];d.className='cell'+(c?' filled':'');if(c)d.style.setProperty('--c',c);b.appendChild(d)}drawNext();if(over)setTimeout(()=>alert('Game over — score '+score),50)}function drawNext(){const n=$('#next');n.innerHTML='';const active=new Map(SHAPES[next?.t||'O'][0].map(p=>[p.join(','),COLORS[next?.t||'O']]));for(let y=0;y<4;y++)for(let x=0;x<4;x++){const d=document.createElement('div');const c=active.get(x+','+y);if(c){d.className='on';d.style.setProperty('--c',c)}n.appendChild(d)}}function reset(){grid=empty();piece=rand();next=rand();score=0;lines=0;over=false;$('#score').textContent=0;$('#lines').textContent=0;draw()}function loop(t){if(t-last>650){soft();last=t}requestAnimationFrame(loop)}$('#left').onclick=()=>move(-1);$('#right').onclick=()=>move(1);$('#rotate').onclick=rotate;$('#drop').onclick=soft;$('#hard').onclick=hard;$('#reset').onclick=reset;addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1);if(e.key==='ArrowUp')rotate();if(e.key==='ArrowDown')soft();if(e.code==='Space')hard()});reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
