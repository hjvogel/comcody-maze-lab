version: 1.1
kind: ComCody Pack v1 schema
required:
  - type
  - label
  - behavior
  - source
piece_pack:
  required_files:
    - piece.yaml
    - piece.js
    - tests.yaml
  optional_files:
    - README.md
    - preview.png
fields:
  id: stable global id, for example comcody.example.dash_two
  type: local machine id used in the Piece Store and runtime
  name: human name
  label: visible block label
  icon: visible block icon
  role: flow | template | child | primitive | event_router
  behavior: existing runtime behavior or custom run(ctx,piece) behavior
  class: visual style class
  defaults: default settings copied into new instances
  children: optional ordered list of reusable child piece references
  source:
    file: piece.js
runtime:
  preferred_behaviors:
    - move
    - timer
    - repeat
    - face_dir
    - random_wall
    - input
    - score
    - spawn_piece
    - rotate_shape
    - lock_piece
    - clear_rows
  custom_source:
    entry: export async function run(ctx, piece)
    context:
      - ctx.move(steps)
      - ctx.face(dir)
      - ctx.wait(ms)
      - ctx.runChildren(piece)
      - ctx.score(reason, points)
      - ctx.spawnRandomPiece()
      - ctx.rotateShape()
      - ctx.lockPiece()
      - ctx.clearRows()
import_rules:
  - validate manifest before registering
  - register imported pieces into the same Piece Store as native pieces
  - imported Expert Code must come from piece.js when present
  - imported pieces must use the same settings path as native pieces
export_rules:
  piece_zip:
    files: [piece.yaml, piece.js, tests.yaml, README.md]
  game_zip:
    files: [comcody-pack.yaml, game.yaml, game.json, game.js, tests.yaml, README.md]
ui_rules:
  open_settings: double_click_piece
  settings_wheels: forbidden_in_program_stack
  expert_code_location: inside_piece_settings

button_action_contract:
  import_buttons:
    controller: shared_capture_phase_controller
    file_input: singleton_hidden_file_input
    required_feedback: visible_status
  export_buttons:
    controller: shared_capture_phase_controller
    fallback: visible_download_link
    required_feedback: visible_status
